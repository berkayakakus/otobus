<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eskişehir Otobüs</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #fff; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }

.header { background: #16213e; padding: 16px 16px 14px; border-bottom: 1px solid #0f3460; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.header-label { font-size: 11px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; }
.header-right { text-align: right; }
.header-name { font-size: 11px; color: #64748b; letter-spacing: 1px; }
.header-date { font-size: 10px; color: #475569; margin-top: 2px; }
.header-day { font-size: 10px; color: #475569; margin-top: 1px; }
.header-time { font-size: 36px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.header-seconds { font-size: 20px; font-weight: 400; color: #64748b; }

.section-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin: 14px 16px 8px; }

.card { background: #16213e; border-radius: 16px; margin: 0 16px 10px; padding: 14px; cursor: pointer; border: 1px solid #0f3460; position: relative; overflow: hidden; }
.card:active { opacity: 0.8; }
.accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 16px 0 0 16px; }
.card-inner { padding-left: 8px; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-name { font-weight: 800; font-size: 15px; }
.card-route { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.badge { border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; text-align: right; }
.badge-time { font-size: 11px; color: #64748b; margin-top: 3px; text-align: right; }
.times { display: flex; gap: 6px; flex-wrap: wrap; }
.time-pill { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.no-bus { font-size: 12px; color: #475569; }

/* Detail view */
.detail { display: none; }
.detail.active { display: block; }
.main-view { display: block; }
.main-view.hidden { display: none; }

.detail-header { background: #16213e; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #0f3460; position: sticky; top: 0; z-index: 10; }
.back-btn { background: #0f3460; border: none; color: #fff; font-size: 18px; cursor: pointer; padding: 8px 14px; border-radius: 10px; flex-shrink: 0; }
.back-btn:active { opacity: 0.7; }
.detail-name { font-weight: 700; font-size: 16px; }
.detail-route { font-size: 12px; color: #94a3b8; }

.hour-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #0f3460; }
.hour-box { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex-shrink: 0; }
.hour-times { display: flex; flex-wrap: wrap; gap: 8px; }
.hour-pill { padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }

.footer { text-align: center; padding: 12px; color: #334155; font-size: 11px; }
</style>
</head>
<body>

<div class="main-view" id="mainView">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-label">Eskişehir</div>
        <div class="header-time" id="clockMain">--:<span style="font-size:28px;color:#94a3b8">--</span><span class="header-seconds" id="secMain">:--</span></div>
      </div>
      <div class="header-right">
        <div class="header-name">Berkay Akakuş</div>
        <div class="header-date" id="dateMain">-- -- --</div>
        <div class="header-day" id="dayMain">---</div>
      </div>
    </div>
  </div>
  <div class="section-label">Hatlar</div>
  <div id="cardContainer"></div>
  <div class="footer">Her saniye güncellenir</div>
</div>

<div class="detail" id="detailView">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">← Geri</button>
    <div>
      <div class="detail-name" id="detailName"></div>
      <div class="detail-route" id="detailRoute"></div>
    </div>
  </div>
  <div id="detailContent"></div>
</div>

<script>
const busData = {
  "5 SİYAH": {
    guzergah: "Odunpazarı → Yaşamkent Mh.",
    color: "#e85d04",
    saatler: {
      6:["06:45"], 7:["07:15","07:45"], 8:["08:15","08:45"],
      9:["09:15","09:45"], 10:["10:15","10:45"], 11:["11:15","11:45"],
      12:["12:15","12:45"], 13:["13:15","13:45"], 14:["14:15","14:45"],
      15:["15:25","15:55"], 16:["16:25","16:55"], 17:["17:25"],
      18:["18:00","18:30"], 19:["19:05","19:35"], 20:["20:10"],
      0:["00:15"], 21:["21:10","21:40"], 22:["22:15","22:50"], 23:["23:30"]
    }
  },
  "23 SİYAH": {
    guzergah: "Odunpazarı → Batıkent Mh.",
    color: "#dc2626",
    saatler: {
      6:["06:30","06:50"], 7:["07:10","07:30","07:50"],
      8:["08:10","08:30","08:50"], 9:["09:10","09:30","09:50"],
      10:["10:20","10:50"], 11:["11:20","11:50"], 12:["12:20","12:50"],
      13:["13:20","13:50"], 14:["14:20","14:50"],
      15:["15:10","15:30","15:50"], 16:["16:10","16:30","16:50"],
      17:["17:10","17:30","17:50"], 18:["18:10","18:30","18:50"],
      19:["19:10","19:30","19:50"], 20:["20:10","20:50"],
      21:["21:30"], 22:["22:10","22:50"], 23:["23:30"]
    }
  },
  "54 SİYAH": {
    guzergah: "Odunpazarı → Batıkent Mh.",
    color: "#7c3aed",
    saatler: {
      6:["06:20","06:40"], 7:["07:00","07:20","07:40"],
      8:["08:00","08:20","08:40"], 9:["09:00","09:20","09:40"],
      10:["10:05","10:35"], 11:["11:05","11:35"], 12:["12:05","12:35"],
      13:["13:05","13:35"], 14:["14:05","14:35"],
      15:["15:00","15:20","15:40"], 16:["16:00","16:20","16:40"],
      17:["17:00","17:20","17:40"], 18:["18:00","18:20","18:40"],
      19:["19:00","19:20","19:40"], 20:["20:00","20:30"],
      21:["21:15"], 22:["22:00","22:45"], 23:["23:30"]
    }
  },
  "58 SİYAH": {
    guzergah: "Odunpazarı → Çukurhisar",
    color: "#059669",
    saatler: {
      6:["06:15","06:30"], 7:["07:00","07:30"],
      8:["08:00","08:15","08:45"], 9:["09:00","09:25","09:50"],
      10:["10:15","10:40"], 11:["11:05","11:30","11:55"],
      12:["12:20","12:45"], 13:["13:10","13:35"],
      14:["14:00","14:25","14:50"], 15:["15:15","15:40"],
      16:["16:05","16:30","16:55"], 17:["17:20","17:45"],
      18:["18:10","18:35"], 19:["19:00","19:30"], 20:["20:00"],
      21:["21:00","21:45"], 22:["22:30"], 23:["23:15","23:45"]
    }
  }
};

const GUNLER = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const AYLAR = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

function toMin(t) {
  const [h,m] = t.split(":").map(Number);
  return h*60+m;
}
function getNowMin() {
  const n = new Date();
  return n.getHours()*60 + n.getMinutes();
}
function getNowH() { return new Date().getHours(); }
function pad(n) { return String(n).padStart(2,'0'); }

function getUpcoming(bus, count=4) {
  const now = getNowMin();
  const all = [];
  for (const h in bus.saatler) {
    for (const t of bus.saatler[h]) all.push(t);
  }
  all.sort((a,b) => toMin(a)-toMin(b));
  return all.filter(t => toMin(t) > now).slice(0, count);
}

function minsUntil(t) {
  return toMin(t) - getNowMin();
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';
  for (const [name, bus] of Object.entries(busData)) {
    const upcoming = getUpcoming(bus);
    const next = upcoming[0];
    const mins = next ? minsUntil(next) : null;
    const badgeColor = mins === null ? '#1e293b' : mins < 10 ? '#dc2626' : mins < 30 ? '#d97706' : '#166534';
    const badgeText = mins === null ? '' : mins === 0 ? 'Şimdi!' : `${mins} dk`;
    let pillsHTML = '';
    if (upcoming.length === 0) {
      pillsHTML = '<span class="no-bus">Bugünlük bitti</span>';
    } else {
      pillsHTML = upcoming.map((t,i) => {
        const bg = i===0 ? bus.color+'33' : '#0f3460';
        const col = i===0 ? bus.color : '#94a3b8';
        const border = i===0 ? `1px solid ${bus.color}66` : '1px solid transparent';
        return `<span class="time-pill" style="background:${bg};color:${col};border:${border}">${t}</span>`;
      }).join('');
    }
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openDetail(name);
    card.innerHTML = `
      <div class="accent" style="background:${bus.color}"></div>
      <div class="card-inner">
        <div class="card-top">
          <div>
            <div class="card-name" style="color:${bus.color}">${name}</div>
            <div class="card-route">${bus.guzergah}</div>
          </div>
          ${next ? `<div>
            <div class="badge" style="background:${badgeColor}">${badgeText}</div>
            <div class="badge-time">${next}</div>
          </div>` : ''}
        </div>
        <div class="times">${pillsHTML}</div>
      </div>
    `;
    container.appendChild(card);
  }
}

function openDetail(name) {
  const bus = busData[name];
  const upcoming = getUpcoming(bus, 100);
  const nowH = getNowH();
  const nowMin = getNowMin();
  document.getElementById('detailName').textContent = name;
  document.getElementById('detailRoute').textContent = bus.guzergah;
  const hours = Object.keys(bus.saatler).map(Number).sort((a,b)=>a-b);
  let html = '';
  for (const h of hours) {
    const times = bus.saatler[h];
    const isCurrent = h === nowH;
    const boxBg = isCurrent ? bus.color : '#0f3460';
    const pillsHTML = times.map(t => {
      const isPast = toMin(t) < nowMin;
      const isNext = upcoming[0] === t;
      const bg = isNext ? bus.color : isPast ? '#1e293b' : '#1e3a5f';
      const col = isPast ? '#475569' : '#fff';
      const border = isNext ? `2px solid ${bus.color}` : '2px solid transparent';
      return `<span class="hour-pill" style="background:${bg};color:${col};border:${border}">${t}</span>`;
    }).join('');
    html += `
      <div class="hour-row">
        <div class="hour-box" style="background:${boxBg}">${h}</div>
        <div class="hour-times">${pillsHTML}</div>
      </div>
    `;
  }
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('mainView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');
  history.pushState({page:'detail', name}, '', '');
}

function goBack() {
  document.getElementById('mainView').classList.remove('hidden');
  document.getElementById('detailView').classList.remove('active');
}

window.addEventListener('popstate', function(e) {
  if (document.getElementById('detailView').classList.contains('active')) {
    goBack();
  }
});

function tick() {
  const n = new Date();
  const h = pad(n.getHours());
  const m = pad(n.getMinutes());
  const s = pad(n.getSeconds());
  document.getElementById('clockMain').innerHTML =
    `${h}:<span style="font-size:28px;color:#94a3b8">${m}</span><span class="header-seconds">:${s}</span>`;
  document.getElementById('dateMain').textContent =
    `${n.getDate()} ${AYLAR[n.getMonth()]} ${n.getFullYear()}`;
  document.getElementById('dayMain').textContent = GUNLER[n.getDay()];
  renderCards();
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
